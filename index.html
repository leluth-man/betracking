<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>B.E Tracking</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: orange;
      cursor: pointer;
      margin-left: 10px;
    }

    #resultat {
      margin-top: 30px;
    }

    .step {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
    }

    .circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 10px;
    }
  </style>
</head>

<body>

  <h1>📦 Suivi de colis B.E</h1>

  <input id="trackingInput" placeholder="Entrez votre numéro">
  <button onclick="rechercherColis()">🔍</button>

  <div id="resultat"></div>

  <script>
    const API_URL = "https://opensheet.elk.sh/1fPPcx6Y8HhxIgiHjyHGVUhSxlo2gc2iW5Eh1LNpWFRg/Feuille1";

    function genererTimeline(statut) {
      const steps = ["RECU", "TRANSIT", "DOUANE", "ARRIVE", "LIVRE"];

      return steps.map(step => {
        const active = steps.indexOf(step) <= steps.indexOf(statut);

        return `
          <div class="step">
            <div class="circle" style="background:${active ? '#00ff88' : '#555'}"></div>
            <div style="color:${active ? '#00ff88' : '#aaa'}">${step}</div>
          </div>
        `;
      }).join("");
    }

    async function rechercherColis() {
      const input = document.getElementById("trackingInput").value.trim().toUpperCase();

      const res = await fetch(API_URL);
      const data = await res.json();

      const colis = data.find(c => c.ID === input);

      const zone = document.getElementById("resultat");

      if (colis) {
        zone.innerHTML = `
          <h2>📦 ${colis.ID}</h2>
          <p>Client: ${colis["CLIENTS"]}</p>
          <p>Destination: ${colis["DESTINATIONS"]}</p>
          <p>Statut: ${colis["STATUTS"]}</p>

          <div style="margin-top:20px;">
            ${genererTimeline(colis["STATUTS"])}
          </div>
        `;
      } else {
        zone.innerHTML = `<p style="color:red;">❌ Numéro introuvable</p>`;
      }
    }
  </script>

</body>
</html>
