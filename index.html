<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>B.E Tracking</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: orange;
      cursor: pointer;
      margin-left: 10px;
    }

    #resultat {
      margin-top: 30px;
    }

    .step {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px 0;
    }

    .circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<h1>📦 Suivi de colis B.E</h1>

<input id="trackingInput" placeholder="Entrez votre numéro">
<button type="button" onclick="rechercherColis()">🔍</button>

<div id="resultat"></div>

<script>
const API_URL = "https://opensheet.elk.sh/1fPPcx6Y8HhxIgiHjyHGVUhSxlo2gc2iW5Eh1LNpWFRg/Feuille1";

// 🔥 Permet d'utiliser la touche ENTER
document.getElementById("trackingInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    rechercherColis();
  }
});

function genererTimeline(statut) {
  const steps = ["RECU", "TRANSIT", "DOUANE", "ARRIVE", "LIVRE"];

  return steps.map(step => {
    const active = steps.indexOf(step) <= steps.indexOf(statut);

    return `
      <div style="margin:5px;">
        <span style="color:${active ? 'lime' : 'gray'}">●</span>
        ${step}
      </div>
    `;
  }).join("");
}

async function rechercherColis() {
  console.log("🔍 Recherche lancée"); // DEBUG

  const input = document.getElementById("trackingInput").value.trim().toUpperCase();

  if (!input) {
    alert("Entre un numéro");
    return;
  }

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    console.log("DATA:", data); // DEBUG

    const colis = data.find(c => c.ID === input);

    const zone = document.getElementById("resultat");

    if (colis) {
      zone.innerHTML = `
        <h2>${colis.ID}</h2>
        <p>${colis["CLIENTS"]}</p>
        <p>${colis["STATUTS"]}</p>
        ${genererTimeline(colis["STATUTS"])}
      `;
    } else {
      zone.innerHTML = `<p style="color:red;">Introuvable</p>`;
    }

  } catch (error) {
    console.error("ERREUR:", error);
    alert("Erreur connexion Google Sheets");
  }
}
</script>

</body>
  
</html>
